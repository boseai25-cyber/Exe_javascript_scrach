<!--Instead of displaying 'heads' or 'tails' in the console, save the result in a variable called 'result'.
-->

<!doctype html>
<html>
  <head>
    <title>coin tass game</title>
  </head>
  <script>
    let randomNumber = Math.random();
    let result = '';
    
    if (randomNumber >= 0.5) {
      result = 'heads';
    } else {
      result = 'tails';
    }
  </script>
</html>
