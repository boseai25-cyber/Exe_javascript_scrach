<!--Continuing from 6a, create a variable called 'name' and save your name inside (as a string). Update the if-statement to display your name in each message. For example: 'Good morning ${name}!'
-->

<!doctype html>
<html>
  <head>
    <title>greetings</title>
  </head>
  <script>
    let hour = 9
    let name = 'bose'

    if (hour >= 6 && hour <= 12) {
      console.log(`good morning! ${name}`);
    } else if (hour >= 13 && hour <= 17) {
      console.log(`good afternoon! ${name}`);
    } else {
      console.log(`good night! ${name}`);
    }
    
  </script>
</html>
