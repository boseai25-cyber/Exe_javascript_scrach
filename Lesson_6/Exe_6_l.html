<!--In exercises 5i - 5k, we created the 'Remove from cart', '-2', and '-3' buttons. Before updating the quantity, check if it will go below 0:
If it will, create a popup saying 'Not enough items in the cart' and don't update the quantity.
Otherwise, update the quantity and console.log() it as usual.
-->

<!doctype html>
<html>
  <head>
    <title>cart quantity project </title>    
  </head>
  <body>
    <script>

    let quantity = 0;
      
    
    <button onclick="
      if (quantity + 4 >= 10) {  
        alert('the card is full');
      } else{
        quantity += 4;
        Console.log(quantity);
        ">+4</button>
      }

    <button onclick="
      if (quantity + 5 >= 10) {  
        alert('the card is full');
      } else{
        quantity += 5;
        Console.log(quantity);
        ">+5</button>
      } 
      
    
    <button onclick="
      if (quantity - 1 <= 0) {  
        alert('not enough items in the cart');
      } else{
        quantity -= 1;
        Console.log(quantity);
        ">Remove from cart</button>
      }
    
    <button onclick="
      if (quantity - 2 <= 0) {  
        alert('not enough items in the cart');
      } else{
        quantity -= 2;
        console.log(quantity);
        ">-2</button>
    
    <button onclick="
      if (quantity - 3 <= 0) {  
        alert('not enough items in the cart');
      } else{
        quantity -= 3;
        console.log(quantity);
        ">-3</button>
      } 
    </script>
  </body>
</html>
