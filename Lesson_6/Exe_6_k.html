<!--Let's say the cart has a maximum quantity of 10. Before updating the quantity, check if the quantity will be greater than 10:
If it will, display a popup saying 'The cart is full' and don't update the quantity.
Otherwise, update the quantity and console.log() it as usual.
-->

<!doctype html>
<html>
  <head>
    <title>cart quantity project </title>    
  </head>
  <body>
    <script>

    let quantity = 0;
      
    
    <button onclick="
      if (quantity + 4 >= 10) {  
        alert('the card is full');
      } else{
        quantity += 4;
        Console.log(quantity);
        ">+4</button>
      }

    <button onclick="
      if (quantity + 5 >= 10) {  
        alert('the card is full');
      } else{
        quantity += 5;
        Console.log(quantity);
        ">+5</button>
      } 
      

    <button onclick="
      quantity -= 1;
      Console.log(quantity);
        ">Remove from cart</button>
    
    <button onclick="
      quantity -= 2;
      console.log(quantity);
      ">-2</button>
    
    <button onclick="
     quantity -= 3;
     console.log(quantity);
      ">-3</button>
    
        
    </script>
  </body>
</html>
