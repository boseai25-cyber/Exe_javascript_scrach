<!--Create an if-statement and check:
If the number is less than 0.5, then display 'heads' in the console.
Else display 'tails' in the console.
-->

<!doctype html>
<html>
  <head>
    <title>coin tass game</title>
  </head>
  <script>
    let randomNumber = Math.random();
    
    if (randomNumber >= 0.5) {
      console.log('heads');
    } else {
      console.log('tails');
    }
  </script>
</html>
