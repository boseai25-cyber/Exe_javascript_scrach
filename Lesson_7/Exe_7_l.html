<!--Modify 'updateCartQuantity' so that if the quantity is invalid, alert(); and then return; (this is called an early return). An early return make our code cleaner because we can remove the 'else-if' / 'else'.
-->

<!doctype html>
<html>
  <head>
    <title>cart quantity project </title>    
  </head>
  <body>
    <script>

    let quantity = 0;
      
    
    <button onclick="
        Console.log(updateCardQuantity(+4));
        ">+4</button>
      

    <button onclick="
        Console.log(updateCardQuantity(+5));
        ">+5</button>
      
      
    
    <button onclick="
        Console.log(updateCardQuantity(-1));
        ">Remove from cart</button>
      
    
    <button onclick="
        console.log(updateCardQuantity(-2));
        ">-2</button>
    
    <button onclick="
     console.log(updateCardQuantity(-3));
        ">-3</button>
      

      function updateCardQuantity(button) {
        
        
          if (quantity + button >= 10) {  
            alert('the card is full');
            return;
          }
       
          if (quantity - button >= 10) {  
            alert('the card is full');
            return;
         }
        
        quantity -= button;
        return quantity;
      }
    </script>
  </body>
</html>
