<!--Continuing from 5f, calculate the total (cost + tax), save it in a variable called 'totalCost', and display the message 'Total cost: $${totalCost)' in the console.
-->

<!doctype html>
<html>
  <script>
    const coffee = 5;
    const bangels = 3;
    const soup = 9;
    var cost = coffee + 2 * bangels + soup;
    var tax = cost * 0.1;
    var totalCost = cost + tax;

    console.log(`cost of food: $${cost}`);
    Console.log(`tax (10%): $${tax}`);
    Console.log(`total cost: $${totalCost}`);    
    
  </script>
</html>
