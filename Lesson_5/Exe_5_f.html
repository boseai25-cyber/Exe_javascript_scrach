<!--Continuing from 5e, display 'Tax (10%): $$(tax}' in the console.
-->

<!doctype html>
<html>
  <script>
    const coffee = 5;
    const bangels = 3;
    const soup = 9;
    var cost = coffee + 2 * bangels + soup;
    var tax = cost * 0.1;

    console.log(`cost of food: $${cost}`);
    console.log(`tax (10%): $${tax}`);

  </script>
</html>
