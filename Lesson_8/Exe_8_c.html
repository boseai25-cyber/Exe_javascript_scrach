<!--Using bracket notation, add a property 'delivery-time' to the object with the value '3 days'. Display the updated object in the console.
-->

<!doctype html>
<html>
  <head>
    <title>amazon project</title>
  </head>
  <body>
    <script>
      
      const basketball = {
        name: 'basketball'
        price: 2095
      };

      console.log(basketball);

      basketball.price += 500;

      console.log(basketball);

      basketball['delivery-time'] = '3 days';

      console.log(basketball);

    </script>
  </body>
</html>
