<!--Let's say in the Amazon project, we have a basketball product. This product has a name of 'basketball', a price of 2095 cents. Create an object to represent this product and display it in the console.
-->

<html>
  <head>
    <title>amazon project</title>
  </head>
  <body>
    <script>
      
      const basketball = {

        price: 2095
      };

      console.log(basketball);
    </script>
  </body>
</html>
