<!--Create a function 'isSameProduct(product), product2)', which returns true if 2 products have the same values inside ('name' and 'price'). If not, return false. Create 2 products and try out the function. (Hint: objects are references so you can't compare them directly).
-->

<!doctype html>
<html>
  <head>
    <title>amazon project</title>
  </head>
  <body>
    <script>
      
      const product1= {
        name: 'basketball'
        price: 2095
      };

      const product2 = {
        name: 'shoes'
        price: 5099
      };
      
      function isSameProduct(product1, product2) {
        if (
         product1.price === product2.price &&
         product1.name === product2.name 
        ) {
          return true;
        } else {
          return false;
        }
      }

      console.log(isSameProduct(product1, product2));

    </script>
  </body>
</html>
