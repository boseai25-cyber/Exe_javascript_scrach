<!--Continuing from 8a, let's say we want to increase the price by 500 cents. Use dot notation to increase the price, and display the updated object in the console.
-->

<!doctype html>
<html>
  <head>
    <title>amazon project</title>
  </head>
  <body>
    <script>
      
      const basketball = {
        name: 'basketball'
        price: 2095
      };

      console.log(basketball);

      basketball.price += 500;

      console.log(basketball);
    </script>
  </body>
</html>
