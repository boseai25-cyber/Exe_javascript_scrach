<!doctype html>
<html>
  <head>
    <title>coin tass game</title>
  </head>
  <body>
    <button onclick="
      playgame('heads');
      ">head</button>

    <button onclick="
      playgame('tails');
      ">tails</button>
    
  <script>

    function playgame (guess) {
      const randomNumber = Math.random();
      const result = randomNumber >= 0.5 ? 'heads' : 'tails';
    
      console.log(guess === result ? 'you win': 'you lose');
    }
  </script>
  </body>
</html>
