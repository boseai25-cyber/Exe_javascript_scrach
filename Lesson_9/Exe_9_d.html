<!--Create a text box (<input>) and a submit button. When clicking 'Submit', display 'Your name is: ${text}' on the page (${text} = the text inside the text box) (hint: use .value to get the text inside an <input>).
-->

<!doctype html>
<html>
  <head>
    
  </head>
  <body>

    <input placeholder="you name" class="js-input">

    <button onclick="
      cost name = document.querySelector('.js-input')

  </body>
</html>
