<!doctype html>
<html>
  <head>
    
  </head>
  <body>

    <input placeholder="you name" class="js-input"
      onkeydown="
      if (event.key === 'Enter') {
        displayName();
      }">

    <button onclick="
      displayName();
      ">submit</button>
        
    <p class="js-name"></p>
    
    <script>
      
      function displayName() {
        cost name = document.querySelector('.js-input');
        document.querySelector('.js-name").innerHTML = `Youer name is: ${name.value}`;
      }
      
    </script>
  </body>
</html>
