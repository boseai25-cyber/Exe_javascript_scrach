<!--Create 2 buttons 'heads' and 'tails', and a paragraph (<p></p>) underneath. When clicking the 'heads' button, display 'You chose: heads' in the paragraph. When the 'tails' button, display 'You chose: tails'.
-->

<!doctype html>
<html>
  <head>
    
  </head>
  <body>

    <button
      class="js-button-heads"
      onclick="changeText('heads')">heads</button>
    <button
      class="js-button-tails"
      onclick="changeText('tails')">tails</button>
    
    <p class="result"></p>
    
    <script>
      
      function changeText(name) {
        
        if (name === 'heads') {
          document.querySelector('result').innnerHTML = 'youer chose: heads';
        } else {
          document.querySelector('result').innnerHTML = 'youer chose: tails';
        }
      }
      
    </script>
  </body>
</html>
